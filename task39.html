<!DOCTYPE html>
<html>
<head>
    <title>Student CRUD</title>
</head>
<body>
    <h1>Students</h1>

    <a href="/create/">Add Student</a>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.email }}</td>
            <td>
                <a href="/update/{{ student.id }}/">Edit</a>
                <a href="/delete/{{ student.id }}/">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
